root = "."
tmp_dir = "tmp/air"
env_files = []

[build]
cmd = "templ generate -path internal/snowflakes && GOWORK=off go build -buildvcs=false -o ./.self-host/bin/snowflakes ./cmd/snowflakes"
entrypoint = ["zsh", "-lc", "exec ./.self-host/bin/snowflakes >> ./.self-host/logs/snowflakes.log 2>&1"]
include_ext = ["go", "templ", "css", "js", "txt", "svg"]
include_dir = ["cmd", "internal"]
include_file = ["go.mod", "go.sum", "self_host.zsh"]
exclude_dir = [".git", ".self-host", "tmp"]
exclude_regex = ["_templ\\.go$"]
delay = 500
stop_on_error = false
poll = false

[log]
time = true

[misc]
clean_on_exit = true
startup_banner = ""

[screen]
clear_on_rebuild = false
keep_scroll = true

[proxy]
enabled = true
proxy_port = 3401
app_port = 3400
app_start_timeout = 10000
